<!doctype html>
<html><head><meta charset="utf-8"><title>vector_mul</title>
<style>
body{margin:0;font:14px Arial,sans-serif;color:#172033;background:#f6f8fb}

h1{margin:0;font-size:18px;letter-spacing:0}.layout{display:grid;grid-template-columns:minmax(700px,1fr) 340px;height:calc(100vh - 50px)}
#viewport{overflow:auto;position:relative}.canvas{position:relative;margin:20px;min-height:300px}
.lane-label{position:absolute;left:0;width:110px;font-weight:700;padding-top:22px}
.lane-line{position:absolute;left:110px;height:1px;background:#ccd4df}
.node{position:absolute;height:64px;padding:8px;box-sizing:border-box;background:#fff;border:2px solid #2463eb;border-radius:6px;cursor:pointer;overflow:hidden}
.node.write{border-color:#dc2626}.node.selected{box-shadow:0 0 0 3px #fbbf24}.node b{display:block}.node small{display:block;color:#526071;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node.compact{height:34px;padding:0;border-radius:3px}.node.compact b,.node.compact small{display:none}
svg{position:absolute;left:0;top:0;pointer-events:none;overflow:visible}.edge{stroke:#707b8c;stroke-width:1.5;fill:none}.order-edge{stroke:#9aa4b2;stroke-width:1;stroke-dasharray:4 4;fill:none}
aside{background:#fff;border-left:1px solid #d9dfe8;padding:18px;overflow:auto}dt{font-weight:700;margin-top:12px}dd{margin:3px 0;word-break:break-word}.hint{color:#667085}
</style></head><body><header><h1>vector_mul</h1></header>
<div class="layout"><div id="viewport"><div id="canvas" class="canvas"><svg id="edges"></svg></div></div>
<aside><div id="details" class="hint">Click a transaction to inspect its AXI and dependency details.</div></aside></div>
<script>
const txns=[{"id": "txn_in1_0", "direction": "read", "argument": "in1", "bundle": "gmem", "byte_addr": 0, "axlen": 15, "beats": 16, "elements_per_beat": 1, "range": "in1[0..15]", "elements": ["in1[0]", "in1[1]", "in1[2]", "in1[3]", "in1[4]", "in1[5]", "in1[6]", "in1[7]", "in1[8]", "in1[9]", "in1[10]", "in1[11]", "in1[12]", "in1[13]", "in1[14]", "in1[15]"], "dependencies": [], "issue_order": 0, "complete_order": 16, "timing_model": {"minimum_issue_spacing": 16, "axi_transfer_cycles": 16, "formula": "axi_beat_count", "confidence": "estimated_from_csynth_and_ir_trace", "is_cycle_accurate": false}, "timeline_order_predecessor_id": "", "lane": "in1"}, {"id": "txn_in2_0", "direction": "read", "argument": "in2", "bundle": "gmem", "byte_addr": 0, "axlen": 15, "beats": 16, "elements_per_beat": 1, "range": "in2[0..15]", "elements": ["in2[0]", "in2[1]", "in2[2]", "in2[3]", "in2[4]", "in2[5]", "in2[6]", "in2[7]", "in2[8]", "in2[9]", "in2[10]", "in2[11]", "in2[12]", "in2[13]", "in2[14]", "in2[15]"], "dependencies": [], "issue_order": 16, "complete_order": 32, "timing_model": {"minimum_issue_spacing": 16, "axi_transfer_cycles": 16, "formula": "axi_beat_count", "confidence": "estimated_from_csynth_and_ir_trace", "is_cycle_accurate": false}, "timeline_order_predecessor_id": "", "lane": "in2"}, {"id": "txn_in1_1", "direction": "read", "argument": "in1", "bundle": "gmem", "byte_addr": 64, "axlen": 15, "beats": 16, "elements_per_beat": 1, "range": "in1[16..31]", "elements": ["in1[16]", "in1[17]", "in1[18]", "in1[19]", "in1[20]", "in1[21]", "in1[22]", "in1[23]", "in1[24]", "in1[25]", "in1[26]", "in1[27]", "in1[28]", "in1[29]", "in1[30]", "in1[31]"], "dependencies": [], "issue_order": 32, "complete_order": 48, "timing_model": {"minimum_issue_spacing": 16, "axi_transfer_cycles": 16, "formula": "axi_beat_count", "confidence": "estimated_from_csynth_and_ir_trace", "is_cycle_accurate": false}, "timeline_order_predecessor_id": "", "lane": "in1"}, {"id": "txn_in2_1", "direction": "read", "argument": "in2", "bundle": "gmem", "byte_addr": 64, "axlen": 15, "beats": 16, "elements_per_beat": 1, "range": "in2[16..31]", "elements": ["in2[16]", "in2[17]", "in2[18]", "in2[19]", "in2[20]", "in2[21]", "in2[22]", "in2[23]", "in2[24]", "in2[25]", "in2[26]", "in2[27]", "in2[28]", "in2[29]", "in2[30]", "in2[31]"], "dependencies": [], "issue_order": 48, "complete_order": 64, "timing_model": {"minimum_issue_spacing": 16, "axi_transfer_cycles": 16, "formula": "axi_beat_count", "confidence": "estimated_from_csynth_and_ir_trace", "is_cycle_accurate": false}, "timeline_order_predecessor_id": "", "lane": "in2"}, {"id": "txn_in1_2", "direction": "read", "argument": "in1", "bundle": "gmem", "byte_addr": 128, "axlen": 15, "beats": 16, "elements_per_beat": 1, "range": "in1[32..47]", "elements": ["in1[32]", "in1[33]", "in1[34]", "in1[35]", "in1[36]", "in1[37]", "in1[38]", "in1[39]", "in1[40]", "in1[41]", "in1[42]", "in1[43]", "in1[44]", "in1[45]", "in1[46]", "in1[47]"], "dependencies": [], "issue_order": 64, "complete_order": 80, "timing_model": {"minimum_issue_spacing": 16, "axi_transfer_cycles": 16, "formula": "axi_beat_count", "confidence": "estimated_from_csynth_and_ir_trace", "is_cycle_accurate": false}, "timeline_order_predecessor_id": "", "lane": "in1"}, {"id": "txn_in2_2", "direction": "read", "argument": "in2", "bundle": "gmem", "byte_addr": 128, "axlen": 15, "beats": 16, "elements_per_beat": 1, "range": "in2[32..47]", "elements": ["in2[32]", "in2[33]", "in2[34]", "in2[35]", "in2[36]", "in2[37]", "in2[38]", "in2[39]", "in2[40]", "in2[41]", "in2[42]", "in2[43]", "in2[44]", "in2[45]", "in2[46]", "in2[47]"], "dependencies": [], "issue_order": 80, "complete_order": 96, "timing_model": {"minimum_issue_spacing": 16, "axi_transfer_cycles": 16, "formula": "axi_beat_count", "confidence": "estimated_from_csynth_and_ir_trace", "is_cycle_accurate": false}, "timeline_order_predecessor_id": "", "lane": "in2"}, {"id": "txn_out_0", "direction": "write", "argument": "out", "bundle": "gmem", "byte_addr": 0, "axlen": 15, "beats": 16, "elements_per_beat": 1, "range": "out[0..15]", "elements": ["out[0]", "out[1]", "out[2]", "out[3]", "out[4]", "out[5]", "out[6]", "out[7]", "out[8]", "out[9]", "out[10]", "out[11]", "out[12]", "out[13]", "out[14]", "out[15]"], "dependencies": ["txn_in1_0", "txn_in2_0"], "issue_order": 82, "complete_order": 98, "timing_model": {"loop_ii": 2, "pipeline_depth": 18, "burst_formation_cycles": 32, "axi_transfer_cycles": 16, "pipeline_fill_cycles": 17, "minimum_issue_spacing": 32, "formula": "max(axi_beat_count, useful_element_count * achieved_loop_ii)", "confidence": "estimated_from_csynth_and_ir_trace", "is_cycle_accurate": false}, "timeline_order_predecessor_id": "", "lane": "out"}, {"id": "txn_in1_3", "direction": "read", "argument": "in1", "bundle": "gmem", "byte_addr": 192, "axlen": 15, "beats": 16, "elements_per_beat": 1, "range": "in1[48..63]", "elements": ["in1[48]", "in1[49]", "in1[50]", "in1[51]", "in1[52]", "in1[53]", "in1[54]", "in1[55]", "in1[56]", "in1[57]", "in1[58]", "in1[59]", "in1[60]", "in1[61]", "in1[62]", "in1[63]"], "dependencies": [], "issue_order": 96, "complete_order": 112, "timing_model": {"minimum_issue_spacing": 16, "axi_transfer_cycles": 16, "formula": "axi_beat_count", "confidence": "estimated_from_csynth_and_ir_trace", "is_cycle_accurate": false}, "timeline_order_predecessor_id": "", "lane": "in1"}, {"id": "txn_in2_3", "direction": "read", "argument": "in2", "bundle": "gmem", "byte_addr": 192, "axlen": 15, "beats": 16, "elements_per_beat": 1, "range": "in2[48..63]", "elements": ["in2[48]", "in2[49]", "in2[50]", "in2[51]", "in2[52]", "in2[53]", "in2[54]", "in2[55]", "in2[56]", "in2[57]", "in2[58]", "in2[59]", "in2[60]", "in2[61]", "in2[62]", "in2[63]"], "dependencies": [], "issue_order": 112, "complete_order": 128, "timing_model": {"minimum_issue_spacing": 16, "axi_transfer_cycles": 16, "formula": "axi_beat_count", "confidence": "estimated_from_csynth_and_ir_trace", "is_cycle_accurate": false}, "timeline_order_predecessor_id": "", "lane": "in2"}, {"id": "txn_out_1", "direction": "write", "argument": "out", "bundle": "gmem", "byte_addr": 64, "axlen": 15, "beats": 16, "elements_per_beat": 1, "range": "out[16..31]", "elements": ["out[16]", "out[17]", "out[18]", "out[19]", "out[20]", "out[21]", "out[22]", "out[23]", "out[24]", "out[25]", "out[26]", "out[27]", "out[28]", "out[29]", "out[30]", "out[31]"], "dependencies": ["txn_in1_1", "txn_in2_1"], "issue_order": 114, "complete_order": 130, "timing_model": {"loop_ii": 2, "pipeline_depth": 18, "burst_formation_cycles": 32, "axi_transfer_cycles": 16, "pipeline_fill_cycles": 17, "minimum_issue_spacing": 32, "formula": "max(axi_beat_count, useful_element_count * achieved_loop_ii)", "confidence": "estimated_from_csynth_and_ir_trace", "is_cycle_accurate": false}, "timeline_order_predecessor_id": "", "lane": "out"}, {"id": "txn_out_2", "direction": "write", "argument": "out", "bundle": "gmem", "byte_addr": 128, "axlen": 15, "beats": 16, "elements_per_beat": 1, "range": "out[32..47]", "elements": ["out[32]", "out[33]", "out[34]", "out[35]", "out[36]", "out[37]", "out[38]", "out[39]", "out[40]", "out[41]", "out[42]", "out[43]", "out[44]", "out[45]", "out[46]", "out[47]"], "dependencies": ["txn_in1_2", "txn_in2_2"], "issue_order": 146, "complete_order": 162, "timing_model": {"loop_ii": 2, "pipeline_depth": 18, "burst_formation_cycles": 32, "axi_transfer_cycles": 16, "pipeline_fill_cycles": 17, "minimum_issue_spacing": 32, "formula": "max(axi_beat_count, useful_element_count * achieved_loop_ii)", "confidence": "estimated_from_csynth_and_ir_trace", "is_cycle_accurate": false}, "timeline_order_predecessor_id": "", "lane": "out"}, {"id": "txn_out_3", "direction": "write", "argument": "out", "bundle": "gmem", "byte_addr": 192, "axlen": 15, "beats": 16, "elements_per_beat": 1, "range": "out[48..63]", "elements": ["out[48]", "out[49]", "out[50]", "out[51]", "out[52]", "out[53]", "out[54]", "out[55]", "out[56]", "out[57]", "out[58]", "out[59]", "out[60]", "out[61]", "out[62]", "out[63]"], "dependencies": ["txn_in1_3", "txn_in2_3"], "issue_order": 178, "complete_order": 194, "timing_model": {"loop_ii": 2, "pipeline_depth": 18, "burst_formation_cycles": 32, "axi_transfer_cycles": 16, "pipeline_fill_cycles": 17, "minimum_issue_spacing": 32, "formula": "max(axi_beat_count, useful_element_count * achieved_loop_ii)", "confidence": "estimated_from_csynth_and_ir_trace", "is_cycle_accurate": false}, "timeline_order_predecessor_id": "", "lane": "out"}], canvas=document.getElementById('canvas'), svg=document.getElementById('edges');
const lanes=[...new Set(txns.map(t=>t.lane))], compact=txns.length>80;
const laneStep=compact?70:110, nodeHeight=compact?34:64;
const laneY=new Map(lanes.map((v,i)=>[v,30+i*laneStep]));
const issueValues=[...new Set(txns.map(t=>t.issue_order))].sort((a,b)=>a-b);
const visualIssue=new Map();let visualCursor=0,previousIssue=issueValues[0]||0;
issueValues.forEach((value,index)=>{if(index)visualCursor+=Math.min(2,value-previousIssue);visualIssue.set(value,visualCursor);previousIssue=value});
const maxIssue=Math.max(0,...visualIssue.values());
// Large traces use one narrow block per logical issue slot. Small traces keep
// full cards. This bounds typical graph width without changing dependency data.
const scale=compact?Math.max(12,Math.min(28,Math.floor(7000/Math.max(1,maxIssue+1)))):160;
const nodeWidth=compact?Math.max(8,scale-3):160;
const left=130, width=Math.max(900,left+(maxIssue+2)*scale), height=Math.max(300,lanes.length*laneStep+60);
canvas.style.width=width+'px';canvas.style.height=height+'px';svg.setAttribute('width',width);svg.setAttribute('height',height);
const byId=new Map();
lanes.forEach(l=>{const y=laneY.get(l);const label=document.createElement('div');label.className='lane-label';label.style.top=y+'px';label.textContent=l;canvas.appendChild(label);const line=document.createElement('div');line.className='lane-line';line.style.top=(y+nodeHeight/2)+'px';line.style.width=(width-110)+'px';canvas.appendChild(line)});
txns.forEach(t=>{const n=document.createElement('div');n.className='node '+t.direction+(compact?' compact':'');n.style.width=nodeWidth+'px';n.style.left=(left+visualIssue.get(t.issue_order)*scale)+'px';n.style.top=laneY.get(t.lane)+'px';n.title=t.id+' | '+t.direction+' '+t.range+' | issue '+t.issue_order;n.innerHTML='<b>'+t.id+'</b><small>'+t.direction+' '+t.range+'</small><small>issue '+t.issue_order+' complete '+t.complete_order+'</small>';n.onclick=()=>select(t,n);canvas.appendChild(n);byId.set(t.id,n)});
svg.innerHTML='<defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#707b8c"/></marker><marker id="order-arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#9aa4b2"/></marker></defs>';
txns.forEach(t=>t.dependencies.forEach(s=>{const a=byId.get(s),b=byId.get(t.id);if(!a||!b)return;const x1=a.offsetLeft+nodeWidth,y1=a.offsetTop+nodeHeight/2,x2=b.offsetLeft,y2=b.offsetTop+nodeHeight/2;const bend=compact?12:35;const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('class','edge');p.setAttribute('marker-end','url(#arrow)');p.setAttribute('d',`M${x1},${y1} C${x1+bend},${y1} ${x2-bend},${y2} ${x2},${y2}`);svg.appendChild(p)}));
txns.forEach(t=>{const s=t.timeline_order_predecessor_id;if(!s)return;const a=byId.get(s),b=byId.get(t.id);if(!a||!b)return;const x1=a.offsetLeft+nodeWidth,y1=a.offsetTop+nodeHeight/2,x2=b.offsetLeft,y2=b.offsetTop+nodeHeight/2;const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('class','order-edge');p.setAttribute('marker-end','url(#order-arrow)');p.setAttribute('d',`M${x1},${y1} C${x1+10},${y1} ${x2-10},${y2} ${x2},${y2}`);svg.appendChild(p)});
function esc(v){return String(v).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function select(t,n){document.querySelectorAll('.node').forEach(x=>x.classList.remove('selected'));n.classList.add('selected');const m=t.timing_model||{};const rows=[['transaction id',t.id],['direction',t.direction],['argument',t.argument],['bundle',t.bundle],['byte address',t.byte_addr],['AXI length',t.axlen],['beats',t.beats],['elements per beat',t.elements_per_beat],['index range',t.range],['elements',t.elements.join(', ')],['data dependencies',t.dependencies.join(', ')||'none'],['timeline predecessor',t.timeline_order_predecessor_id||'none'],['issue order',t.issue_order],['completion order',t.complete_order],['achieved loop II',m.loop_ii??'n/a'],['pipeline depth',m.pipeline_depth??'n/a'],['burst formation cycles',m.burst_formation_cycles??'n/a'],['minimum issue spacing',m.minimum_issue_spacing??'n/a'],['timing formula',m.formula||'n/a'],['cycle accurate',m.is_cycle_accurate?'yes':'no']];document.getElementById('details').innerHTML='<dl>'+rows.map(r=>'<dt>'+esc(r[0])+'</dt><dd>'+esc(r[1])+'</dd>').join('')+'</dl>'}
</script></body></html>
