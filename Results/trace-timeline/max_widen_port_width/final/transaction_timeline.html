<!doctype html>
<html><head><meta charset="utf-8"><title>example</title>
<style>
body{margin:0;font:14px Arial,sans-serif;color:#172033;background:#f6f8fb}
header{padding:14px 20px;background:#fff;border-bottom:1px solid #d9dfE8}
h1{margin:0;font-size:18px;letter-spacing:0}.layout{display:grid;grid-template-columns:minmax(700px,1fr) 340px;height:calc(100vh - 50px)}
#viewport{overflow:auto;position:relative}.canvas{position:relative;margin:20px;min-height:300px}
.lane-label{position:absolute;left:0;width:110px;font-weight:700;padding-top:22px}
.lane-line{position:absolute;left:110px;height:1px;background:#ccd4df}
.node{position:absolute;height:64px;padding:8px;box-sizing:border-box;background:#fff;border:2px solid #2463eb;border-radius:6px;cursor:pointer;overflow:hidden}
.node.write{border-color:#dc2626}.node.selected{box-shadow:0 0 0 3px #fbbf24}.node b{display:block}.node small{display:block;color:#526071;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.node.compact{height:34px;padding:0;border-radius:3px}.node.compact b,.node.compact small{display:none}
svg{position:absolute;left:0;top:0;pointer-events:none;overflow:visible}.edge{stroke:#707b8c;stroke-width:1.5;fill:none}.order-edge{stroke:#9aa4b2;stroke-width:1;stroke-dasharray:4 4;fill:none}
aside{background:#fff;border-left:1px solid #d9dfe8;padding:18px;overflow:auto}dt{font-weight:700;margin-top:12px}dd{margin:3px 0;word-break:break-word}.hint{color:#667085}
</style></head><body><header><h1>example</h1></header>
<div class="layout"><div id="viewport"><div id="canvas" class="canvas"><svg id="edges"></svg></div></div>
<aside><div id="details" class="hint">Click a transaction to inspect its AXI and dependency details.</div></aside></div>
<script>
const txns=[{"id": "txn_a_0", "direction": "read", "argument": "a", "bundle": "gmem", "byte_addr": 0, "axlen": 3, "beats": 4, "elements_per_beat": 4, "range": "a[0..15]", "elements": ["a[0]", "a[1]", "a[2]", "a[3]", "a[4]", "a[5]", "a[6]", "a[7]", "a[8]", "a[9]", "a[10]", "a[11]", "a[12]", "a[13]", "a[14]", "a[15]"], "dependencies": [], "issue_order": 0, "complete_order": 4, "timing_model": {"minimum_issue_spacing": 1, "axi_transfer_cycles": 4, "formula": "one logical issue slot for pipelined outstanding reads", "confidence": "estimated_from_csynth_and_ir_trace", "is_cycle_accurate": false}, "timeline_order_predecessor_id": "", "lane": "a"}, {"id": "txn_a_1", "direction": "read", "argument": "a", "bundle": "gmem", "byte_addr": 64, "axlen": 3, "beats": 4, "elements_per_beat": 4, "range": "a[16..31]", "elements": ["a[16]", "a[17]", "a[18]", "a[19]", "a[20]", "a[21]", "a[22]", "a[23]", "a[24]", "a[25]", "a[26]", "a[27]", "a[28]", "a[29]", "a[30]", "a[31]"], "dependencies": [], "issue_order": 1, "complete_order": 5, "timing_model": {"minimum_issue_spacing": 1, "axi_transfer_cycles": 4, "formula": "one logical issue slot for pipelined outstanding reads", "confidence": "estimated_from_csynth_and_ir_trace", "is_cycle_accurate": false}, "timeline_order_predecessor_id": "", "lane": "a"}, {"id": "txn_a_2", "direction": "read", "argument": "a", "bundle": "gmem", "byte_addr": 128, "axlen": 3, "beats": 4, "elements_per_beat": 4, "range": "a[32..47]", "elements": ["a[32]", "a[33]", "a[34]", "a[35]", "a[36]", "a[37]", "a[38]", "a[39]", "a[40]", "a[41]", "a[42]", "a[43]", "a[44]", "a[45]", "a[46]", "a[47]"], "dependencies": [], "issue_order": 2, "complete_order": 6, "timing_model": {"minimum_issue_spacing": 1, "axi_transfer_cycles": 4, "formula": "one logical issue slot for pipelined outstanding reads", "confidence": "estimated_from_csynth_and_ir_trace", "is_cycle_accurate": false}, "timeline_order_predecessor_id": "", "lane": "a"}, {"id": "txn_a_3", "direction": "read", "argument": "a", "bundle": "gmem", "byte_addr": 192, "axlen": 3, "beats": 4, "elements_per_beat": 4, "range": "a[48..63]", "elements": ["a[48]", "a[49]", "a[50]", "a[51]", "a[52]", "a[53]", "a[54]", "a[55]", "a[56]", "a[57]", "a[58]", "a[59]", "a[60]", "a[61]", "a[62]", "a[63]"], "dependencies": [], "issue_order": 3, "complete_order": 7, "timing_model": {"minimum_issue_spacing": 1, "axi_transfer_cycles": 4, "formula": "one logical issue slot for pipelined outstanding reads", "confidence": "estimated_from_csynth_and_ir_trace", "is_cycle_accurate": false}, "timeline_order_predecessor_id": "", "lane": "a"}, {"id": "txn_b_0", "direction": "write", "argument": "b", "bundle": "gmem", "byte_addr": 0, "axlen": 3, "beats": 4, "elements_per_beat": 4, "range": "b[0..15]", "elements": ["b[0]", "b[1]", "b[2]", "b[3]", "b[4]", "b[5]", "b[6]", "b[7]", "b[8]", "b[9]", "b[10]", "b[11]", "b[12]", "b[13]", "b[14]", "b[15]"], "dependencies": ["txn_a_0"], "issue_order": 37, "complete_order": 41, "timing_model": {"loop_ii": 1, "pipeline_depth": 17, "burst_formation_cycles": 16, "axi_transfer_cycles": 4, "pipeline_fill_cycles": 16, "minimum_issue_spacing": 16, "formula": "max(axi_beat_count, useful_element_count * achieved_loop_ii)", "confidence": "estimated_from_csynth_and_ir_trace", "is_cycle_accurate": false}, "timeline_order_predecessor_id": "", "lane": "b"}, {"id": "txn_b_1", "direction": "write", "argument": "b", "bundle": "gmem", "byte_addr": 64, "axlen": 3, "beats": 4, "elements_per_beat": 4, "range": "b[16..31]", "elements": ["b[16]", "b[17]", "b[18]", "b[19]", "b[20]", "b[21]", "b[22]", "b[23]", "b[24]", "b[25]", "b[26]", "b[27]", "b[28]", "b[29]", "b[30]", "b[31]"], "dependencies": ["txn_a_1"], "issue_order": 53, "complete_order": 57, "timing_model": {"loop_ii": 1, "pipeline_depth": 17, "burst_formation_cycles": 16, "axi_transfer_cycles": 4, "pipeline_fill_cycles": 16, "minimum_issue_spacing": 16, "formula": "max(axi_beat_count, useful_element_count * achieved_loop_ii)", "confidence": "estimated_from_csynth_and_ir_trace", "is_cycle_accurate": false}, "timeline_order_predecessor_id": "", "lane": "b"}, {"id": "txn_b_2", "direction": "write", "argument": "b", "bundle": "gmem", "byte_addr": 128, "axlen": 3, "beats": 4, "elements_per_beat": 4, "range": "b[32..47]", "elements": ["b[32]", "b[33]", "b[34]", "b[35]", "b[36]", "b[37]", "b[38]", "b[39]", "b[40]", "b[41]", "b[42]", "b[43]", "b[44]", "b[45]", "b[46]", "b[47]"], "dependencies": ["txn_a_2"], "issue_order": 69, "complete_order": 73, "timing_model": {"loop_ii": 1, "pipeline_depth": 17, "burst_formation_cycles": 16, "axi_transfer_cycles": 4, "pipeline_fill_cycles": 16, "minimum_issue_spacing": 16, "formula": "max(axi_beat_count, useful_element_count * achieved_loop_ii)", "confidence": "estimated_from_csynth_and_ir_trace", "is_cycle_accurate": false}, "timeline_order_predecessor_id": "", "lane": "b"}, {"id": "txn_b_3", "direction": "write", "argument": "b", "bundle": "gmem", "byte_addr": 192, "axlen": 3, "beats": 4, "elements_per_beat": 4, "range": "b[48..63]", "elements": ["b[48]", "b[49]", "b[50]", "b[51]", "b[52]", "b[53]", "b[54]", "b[55]", "b[56]", "b[57]", "b[58]", "b[59]", "b[60]", "b[61]", "b[62]", "b[63]"], "dependencies": ["txn_a_3"], "issue_order": 85, "complete_order": 89, "timing_model": {"loop_ii": 1, "pipeline_depth": 17, "burst_formation_cycles": 16, "axi_transfer_cycles": 4, "pipeline_fill_cycles": 16, "minimum_issue_spacing": 16, "formula": "max(axi_beat_count, useful_element_count * achieved_loop_ii)", "confidence": "estimated_from_csynth_and_ir_trace", "is_cycle_accurate": false}, "timeline_order_predecessor_id": "", "lane": "b"}], canvas=document.getElementById('canvas'), svg=document.getElementById('edges');
const lanes=[...new Set(txns.map(t=>t.lane))], compact=txns.length>80;
const laneStep=compact?70:110, nodeHeight=compact?34:64;
const laneY=new Map(lanes.map((v,i)=>[v,30+i*laneStep]));
const issueValues=[...new Set(txns.map(t=>t.issue_order))].sort((a,b)=>a-b);
const visualIssue=new Map();let visualCursor=0,previousIssue=issueValues[0]||0;
issueValues.forEach((value,index)=>{if(index)visualCursor+=Math.min(2,value-previousIssue);visualIssue.set(value,visualCursor);previousIssue=value});
const maxIssue=Math.max(0,...visualIssue.values());
// Large traces use one narrow block per logical issue slot. Small traces keep
// full cards. This bounds typical graph width without changing dependency data.
const scale=compact?Math.max(12,Math.min(28,Math.floor(7000/Math.max(1,maxIssue+1)))):160;
const nodeWidth=compact?Math.max(8,scale-3):160;
const left=130, width=Math.max(900,left+(maxIssue+2)*scale), height=Math.max(300,lanes.length*laneStep+60);
canvas.style.width=width+'px';canvas.style.height=height+'px';svg.setAttribute('width',width);svg.setAttribute('height',height);
const byId=new Map();
lanes.forEach(l=>{const y=laneY.get(l);const label=document.createElement('div');label.className='lane-label';label.style.top=y+'px';label.textContent=l;canvas.appendChild(label);const line=document.createElement('div');line.className='lane-line';line.style.top=(y+nodeHeight/2)+'px';line.style.width=(width-110)+'px';canvas.appendChild(line)});
txns.forEach(t=>{const n=document.createElement('div');n.className='node '+t.direction+(compact?' compact':'');n.style.width=nodeWidth+'px';n.style.left=(left+visualIssue.get(t.issue_order)*scale)+'px';n.style.top=laneY.get(t.lane)+'px';n.title=t.id+' | '+t.direction+' '+t.range+' | issue '+t.issue_order;n.innerHTML='<b>'+t.id+'</b><small>'+t.direction+' '+t.range+'</small><small>issue '+t.issue_order+' complete '+t.complete_order+'</small>';n.onclick=()=>select(t,n);canvas.appendChild(n);byId.set(t.id,n)});
svg.innerHTML='<defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#707b8c"/></marker><marker id="order-arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#9aa4b2"/></marker></defs>';
txns.forEach(t=>t.dependencies.forEach(s=>{const a=byId.get(s),b=byId.get(t.id);if(!a||!b)return;const x1=a.offsetLeft+nodeWidth,y1=a.offsetTop+nodeHeight/2,x2=b.offsetLeft,y2=b.offsetTop+nodeHeight/2;const bend=compact?12:35;const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('class','edge');p.setAttribute('marker-end','url(#arrow)');p.setAttribute('d',`M${x1},${y1} C${x1+bend},${y1} ${x2-bend},${y2} ${x2},${y2}`);svg.appendChild(p)}));
txns.forEach(t=>{const s=t.timeline_order_predecessor_id;if(!s)return;const a=byId.get(s),b=byId.get(t.id);if(!a||!b)return;const x1=a.offsetLeft+nodeWidth,y1=a.offsetTop+nodeHeight/2,x2=b.offsetLeft,y2=b.offsetTop+nodeHeight/2;const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('class','order-edge');p.setAttribute('marker-end','url(#order-arrow)');p.setAttribute('d',`M${x1},${y1} C${x1+10},${y1} ${x2-10},${y2} ${x2},${y2}`);svg.appendChild(p)});
function esc(v){return String(v).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function select(t,n){document.querySelectorAll('.node').forEach(x=>x.classList.remove('selected'));n.classList.add('selected');const m=t.timing_model||{};const rows=[['transaction id',t.id],['direction',t.direction],['argument',t.argument],['bundle',t.bundle],['byte address',t.byte_addr],['AXI length',t.axlen],['beats',t.beats],['elements per beat',t.elements_per_beat],['index range',t.range],['elements',t.elements.join(', ')],['data dependencies',t.dependencies.join(', ')||'none'],['timeline predecessor',t.timeline_order_predecessor_id||'none'],['issue order',t.issue_order],['completion order',t.complete_order],['achieved loop II',m.loop_ii??'n/a'],['pipeline depth',m.pipeline_depth??'n/a'],['burst formation cycles',m.burst_formation_cycles??'n/a'],['minimum issue spacing',m.minimum_issue_spacing??'n/a'],['timing formula',m.formula||'n/a'],['cycle accurate',m.is_cycle_accurate?'yes':'no']];document.getElementById('details').innerHTML='<dl>'+rows.map(r=>'<dt>'+esc(r[0])+'</dt><dd>'+esc(r[1])+'</dd>').join('')+'</dl>'}
</script></body></html>
